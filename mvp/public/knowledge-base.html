<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyCodeRAG - Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tree-node {
            transition: all 0.2s ease;
        }
        .tree-node:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }
        .tree-line {
            border-left: 1px solid #e5e7eb;
            margin-left: 8px;
        }
        .tree-icon {
            transition: transform 0.2s ease;
        }
        .tree-icon.expanded {
            transform: rotate(90deg);
        }
        .file-analysis {
            max-height: 600px;
            overflow-y: auto;
        }
        .code-block {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <button onclick="goBack()" class="mr-4 text-gray-500 hover:text-gray-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </button>
                    <h1 id="kbTitle" class="text-xl font-semibold text-gray-900">Loading...</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="exportDocumentation()" 
                            class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 text-sm">
                        Export Documentation
                    </button>
                    <span id="userEmail" class="text-sm text-gray-600"></span>
                    <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex h-screen pt-16">
        <!-- Left Sidebar - Directory Tree -->
        <div class="w-80 bg-white border-r border-gray-200 overflow-y-auto">
            <div class="p-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-medium text-gray-900">Directory Structure</h2>
                    <button onclick="refreshStructure()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Loading State -->
                <div id="treeLoading" class="text-center py-8">
                    <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="mt-2 text-sm text-gray-600">Loading directory structure...</p>
                </div>

                <!-- Directory Tree -->
                <div id="directoryTree" class="hidden">
                    <!-- Tree will be rendered here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="text-center py-8 hidden">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p class="mt-2 text-sm text-gray-600">No directory structure available</p>
                </div>
            </div>
        </div>

        <!-- Right Content - File Analysis -->
        <div class="flex-1 flex flex-col">
            <!-- File Header -->
            <div class="bg-white border-b border-gray-200 px-6 py-4">
                <div id="fileHeader" class="hidden">
                    <h2 id="fileName" class="text-lg font-medium text-gray-900"></h2>
                    <div class="flex items-center mt-1">
                        <span id="fileLanguage" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 mr-2"></span>
                        <span id="fileStatus" class="text-sm text-gray-500"></span>
                    </div>
                </div>
                <div id="defaultHeader" class="text-center">
                    <h2 class="text-lg font-medium text-gray-900">Select a file to view analysis</h2>
                    <p class="mt-1 text-sm text-gray-600">Click on any file in the directory tree to see AI-powered code analysis</p>
                </div>
            </div>

            <!-- File Analysis Content -->
            <div class="flex-1 overflow-y-auto">
                <div class="max-w-4xl mx-auto px-6 py-6">
                    <!-- Loading State -->
                    <div id="analysisLoading" class="hidden text-center py-12">
                        <svg class="animate-spin h-12 w-12 text-blue-600 mx-auto" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <p class="mt-2 text-sm text-gray-600">Loading analysis...</p>
                    </div>

                    <!-- Analysis Content -->
                    <div id="analysisContent" class="hidden">
                        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                            <div id="analysisText" class="prose prose-sm max-w-none">
                                <!-- Analysis will be rendered here -->
                            </div>
                        </div>
                    </div>

                    <!-- No Analysis State -->
                    <div id="noAnalysis" class="hidden text-center py-12">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                        <p class="mt-2 text-sm text-gray-600">No analysis available for this file</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Toast -->
    <div id="messageToast" class="fixed top-4 right-4 hidden">
        <div class="bg-white border border-gray-200 rounded-lg shadow-lg p-4 max-w-sm">
            <div class="flex items-center">
                <div id="messageIcon"></div>
                <div class="ml-3">
                    <p id="messageText" class="text-sm font-medium text-gray-900"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentKbId = null;
        let directoryStructure = [];

        // Get knowledge base ID from URL
        function getKbId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // Check authentication and load data
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (!token || !user) {
                window.location.href = '/auth.html';
                return;
            }

            const userData = JSON.parse(user);
            document.getElementById('userEmail').textContent = userData.email;
            
            currentKbId = getKbId();
            if (!currentKbId) {
                window.location.href = '/dashboard.html';
                return;
            }

            loadKnowledgeBaseInfo();
            loadDirectoryStructure();
        }

        // Load knowledge base information
        async function loadKnowledgeBaseInfo() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/knowledge-bases/${currentKbId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('kbTitle').textContent = data.knowledge_base.name;
                } else {
                    showMessage('Failed to load knowledge base info', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
        }

        // Load directory structure
        async function loadDirectoryStructure() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/knowledge-bases/${currentKbId}/structure`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    directoryStructure = data.structure;
                    renderDirectoryTree();
                } else {
                    showMessage('Failed to load directory structure', 'error');
                    document.getElementById('treeLoading').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                document.getElementById('treeLoading').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        // Render directory tree
        function renderDirectoryTree() {
            const container = document.getElementById('directoryTree');
            const loading = document.getElementById('treeLoading');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (directoryStructure.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.classList.remove('hidden');

            // Build tree structure
            const tree = buildTree(directoryStructure);
            container.innerHTML = renderTreeNode(tree);
        }

        // Build tree structure from flat list
        function buildTree(items) {
            const itemMap = {};
            const root = [];

            // Create map of items
            items.forEach(item => {
                itemMap[item.id] = { ...item, children: [] };
            });

            // Build tree
            items.forEach(item => {
                const node = itemMap[item.id];
                if (item.parent_id && itemMap[item.parent_id]) {
                    itemMap[item.parent_id].children.push(node);
                } else {
                    root.push(node);
                }
            });

            return root;
        }

        // Render tree node recursively
        function renderTreeNode(nodes, level = 0) {
            return nodes.map(node => {
                const hasChildren = node.children && node.children.length > 0;
                const isFile = node.type === 'file';
                const hasAnalysis = node.analysis && node.analysis_status === 'completed';
                
                return `
                    <div class="tree-node">
                        <div class="flex items-center py-1 px-2 rounded cursor-pointer hover:bg-gray-50" 
                             style="padding-left: ${level * 16 + 8}px"
                             onclick="${isFile ? `selectFile(${node.id})` : `toggleNode(${node.id})`}">
                            ${hasChildren ? `
                                <svg class="tree-icon w-3 h-3 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            ` : isFile ? `
                                <svg class="w-3 h-3 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            ` : `
                                <svg class="w-3 h-3 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                </svg>
                            `}
                            <span class="text-sm ${isFile ? 'text-gray-700' : 'text-gray-900 font-medium'} ${hasAnalysis ? 'text-blue-600' : ''}">
                                ${node.name}
                            </span>
                            ${hasAnalysis ? '<span class="ml-auto text-xs text-blue-500">✓</span>' : ''}
                        </div>
                        ${hasChildren ? `
                            <div id="children-${node.id}" class="hidden">
                                ${renderTreeNode(node.children, level + 1)}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Toggle directory node
        function toggleNode(nodeId) {
            const children = document.getElementById(`children-${nodeId}`);
            const icon = event.currentTarget.querySelector('.tree-icon');
            
            if (children.classList.contains('hidden')) {
                children.classList.remove('hidden');
                icon.classList.add('expanded');
            } else {
                children.classList.add('hidden');
                icon.classList.remove('expanded');
            }
        }

        // Select file and show analysis
        function selectFile(nodeId) {
            const node = directoryStructure.find(item => item.id === nodeId);
            if (!node) return;

            // Update UI
            document.getElementById('fileHeader').classList.remove('hidden');
            document.getElementById('defaultHeader').classList.add('hidden');
            document.getElementById('fileName').textContent = node.name;
            document.getElementById('fileLanguage').textContent = node.language || 'Unknown';
            document.getElementById('fileStatus').textContent = node.path;

            // Show analysis if available
            if (node.analysis && node.analysis_status === 'completed') {
                document.getElementById('analysisLoading').classList.add('hidden');
                document.getElementById('noAnalysis').classList.add('hidden');
                document.getElementById('analysisContent').classList.remove('hidden');
                document.getElementById('analysisText').innerHTML = formatAnalysis(node.analysis);
            } else {
                document.getElementById('analysisLoading').classList.add('hidden');
                document.getElementById('analysisContent').classList.add('hidden');
                document.getElementById('noAnalysis').classList.remove('hidden');
            }
        }

        // Format analysis text
        function formatAnalysis(analysis) {
            return analysis.split('\n').map(paragraph => 
                paragraph.trim() ? `<p class="mb-4">${paragraph}</p>` : ''
            ).join('');
        }

        // Export documentation
        async function exportDocumentation() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/knowledge-bases/${currentKbId}/export`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    downloadMarkdown(data.documentation, `${document.getElementById('kbTitle').textContent}_documentation.md`);
                    showMessage('Documentation exported successfully', 'success');
                } else {
                    showMessage('Failed to export documentation', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
        }

        // Download markdown file
        function downloadMarkdown(content, filename) {
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Refresh structure
        function refreshStructure() {
            document.getElementById('treeLoading').classList.remove('hidden');
            document.getElementById('directoryTree').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            loadDirectoryStructure();
        }

        // Navigation
        function goBack() {
            window.location.href = '/dashboard.html';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/auth.html';
        }

        // Show message
        function showMessage(message, type) {
            const toast = document.getElementById('messageToast');
            const icon = document.getElementById('messageIcon');
            const text = document.getElementById('messageText');

            text.textContent = message;
            
            if (type === 'success') {
                icon.innerHTML = '<svg class="h-5 w-5 text-green-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>';
            } else if (type === 'error') {
                icon.innerHTML = '<svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>';
            } else {
                icon.innerHTML = '<svg class="h-5 w-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>';
            }

            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Initialize
        window.onload = checkAuth;
    </script>
</body>
</html>
